name: Build GasTV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project ZIP
        run: |
          unzip GasTV-AndroidProject.zip || true
          echo "=== Isi folder ==="
          ls -la GasTVApp/

      - name: Override MainActivity.kt jika ada di repo
        run: |
          DEST="GasTVApp/app/src/main/java/com/gasstv/app/MainActivity.kt"
          if [ -f "MainActivity.kt" ]; then
            echo "Copying MainActivity.kt from root repo..."
            cp MainActivity.kt "$DEST"
            echo "Done!"
          else
            echo "Memakai MainActivity.kt dari ZIP"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate gradlew
        run: |
          cd GasTVApp
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.4 --distribution-type=bin
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd GasTVApp
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GasTV-APK
          path: GasTVApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
